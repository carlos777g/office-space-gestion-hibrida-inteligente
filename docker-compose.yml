# OfficeSpace — full stack in one command:  docker compose up --build
#
#   postgres          5432   shared database (seeded from shared-infra/init-db.sql)
#   catalog-service   3001   space CRUD + admin dashboard   (Swagger at /api-docs)
#   booking-service   3002   auth + reservation engine      (Swagger at /api-docs)
#   frontend          5173   React SPA (served by nginx on container port 80)

services:
  postgres:
    image: postgres:15-alpine
    container_name: officespace-db
    environment:
      POSTGRES_USER: officespace_user
      POSTGRES_PASSWORD: officespace_pass
      POSTGRES_DB: officespace_db
    ports:
      # Host port is overridable to avoid clashing with a local PostgreSQL:
      #   POSTGRES_HOST_PORT=5433 docker compose up
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once, only when the data volume is empty (first boot).
      - ./shared-infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U officespace_user -d officespace_db"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: officespace-catalog
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://officespace_user:officespace_pass@postgres:5432/officespace_db
      JWT_SECRET: officespace_jwt_secret_2026
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    container_name: officespace-booking
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://officespace_user:officespace_pass@postgres:5432/officespace_db
      JWT_SECRET: officespace_jwt_secret_2026
      CATALOG_SERVICE_URL: http://catalog-service:3001
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Baked into the bundle at build time; the browser uses these, so they
        # must be the host-published URLs, not the docker-internal hostnames.
        VITE_CATALOG_API_URL: http://localhost:3001
        VITE_BOOKING_API_URL: http://localhost:3002
    container_name: officespace-frontend
    ports:
      - "5173:80"
    depends_on:
      - catalog-service
      - booking-service
    restart: unless-stopped

volumes:
  pgdata:
